<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Registration</title>
    <style>
        :root {
            --sidebar-bg: #f3f3f3;
            --input-bg: #d9d9d9;
            --border-color: #767676;
            --primary-blue: #3b63bc;
        }

        body {
            padding: 0;
            margin: 0;
            font-family: sans-serif;
            background-color: #fff;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            width: 250px;
            border-right: 1px solid black;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .profile-section {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .profile-circle {
            width: 50px;
            height: 50px;
            background-color: #e0e0e0;
            border-radius: 50%;
        }

        .profile-info span {
            display: block;
            font-size: 14px;
        }

.nav-item {
            padding: 15px 20px; 
            border: 1px solid #999;
            margin-top: -1px; 
            background-color: #e6e6e6;
            text-decoration: none;
            color: black;
            border-radius: 8px;
            font-size: 13px;
            display: block;
            width: 100%; 
            box-sizing: border-box; 
        }

        
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-card {
            border: 1px solid black;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            border-radius: 4px;
        }

        h1, h2 {
            text-align: center;
            margin: 10px 0;
        }

        h1 { font-size: 24px; }
        h2 { font-size: 20px; margin-top: 20px; }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input, select {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 3px;
            font-size: 14px;
        }

        
        .items-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        
        .button-row {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid var(--primary-blue);
        }

        .btn-cancel {
            background: white;
            color: var(--primary-blue);
        }

        .btn-submit {
            background: var(--primary-blue);
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="profile-section">
                <div class="profile-circle"></div>
                <div class="profile-info">
                    <strong>Your full name</strong>
                    <span style="color: #666; font-size: 11px;">Role in the system</span>
                </div>
            </div>
            <a href="#" class="nav-item">Dashboard</a>
            <a href="#" class="nav-item">Sales Management</a>
            <a href="#" class="nav-item">Supplier Management</a>
            <a href="#" class="nav-item">Stock Management</a>
            <a href="#" class="nav-item">Transport Management</a>
        </div>

        <div class="content">
            <div class="form-card">
                <h1>Sales Registration</h1>

                <div class="form-row">
                    <div class="input-group">
                        <label>Sale Date</label>
                        <input type="date">
                    </div>
                    <div class="input-group">
                        <label>Sales Person</label>
                        <select>
                            <option>Select sales representative</option>
                        </select>
                    </div>
                </div>

                <h2>Customer Details</h2>
                <div class="form-row">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" placeholder="Enter full name">
                    </div>
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="text" placeholder="Enter Phone Number">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="Enter email">
                    </div>
                    <div class="input-group">
                        <label>Type</label>
                        <select>
                            <option>Select customer Type</option>
                        </select>
                    </div>
                </div>

                <h2>Items</h2>
                <div class="items-grid">
                    <div class="input-group">
                        <label>Pdt Id</label>
                        <input type="text" placeholder="Pdt ID">
                    </div>
                    <div class="input-group">
                        <label>Quantity</label>
                        <input type="text">
                    </div>
                    <div class="input-group">
                        <label>Unit Price</label>
                        <input type="text">
                    </div>
                </div>
                <div class="items-grid">
                    <div class="input-group">
                        <label>Pdt Id</label>
                        <input type="text" placeholder="Pdt ID">
                    </div>
                    <div class="input-group">
                        <label>Quantity</label>
                        <input type="text">
                    </div>
                    <div class="input-group">
                        <label>Unit Price</label>
                        <input type="text">
                    </div>
                </div>

                <div class="button-row">
                    <button class="btn btn-cancel">Cancel</button>
                    <button class="btn btn-submit">Submit</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
